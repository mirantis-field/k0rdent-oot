controlPlaneNumber: 3
workersNumber: 2

clusterNetwork:
  pods:
    cidrBlocks:
    - "10.244.0.0/16"
  services:
    cidrBlocks:
    - "10.96.0.0/12"
  serviceDomain: "cluster.local"

clusterLabels: {}
clusterAnnotations: {}

ccmRegional: true

identityRef:
  name: ""
  cloudName: ""
  region: ""

bastion:
  enabled: false
  spec:
    sshKeyName: ""
    providerID: ""
    flavor: ""
    image:
      filter:
        name: ""

managedSecurityGroups:
  allowAllInClusterTraffic: false

# Network configuration - supports both managed and existing networks
networking:
  # Set to true to use existing OpenStack network and subnet
  useExistingNetwork: false
  # Existing network configuration (used when useExistingNetwork is true)
  existingNetwork:
    id: ""
    filter:
      name: ""
  # Existing subnet configuration (used when useExistingNetwork is true)  
  existingSubnet:
    id: ""
    filter:
      name: ""
  # Managed subnets (used when useExistingNetwork is false)
  managedSubnets:
  - cidr: 10.6.0.0/24

apiServerLoadBalancer:
  enabled: true

externalNetwork:
  filter:
    name: ""

controlPlane:
  sshKeyName: ""
  providerID: ""
  flavor: ""
  image:
    filter:
      name: ""
  portOpts: []
  rootVolume: 
    sizeGiB: 50
    type: ""  # Cinder volume type - leave empty for default
    availabilityZone:
      name: ""
      from: ""  # Options: "Name" or "Machine"
  additionalBlockDevices: []
  securityGroups:
    - filter:
        name: "default"
        description: ""
        projectID: ""

worker:
  sshKeyName: ""
  providerID: ""
  flavor: ""
  image:
    filter:
      name: ""
  portOpts: []
  rootVolume:
    sizeGiB: 50
    type: ""  # Cinder volume type - leave empty for default
    availabilityZone:
      name: ""
      from: ""  # Options: "Name" or "Machine"
  additionalBlockDevices: []
  securityGroups:
    - filter:
        name: "default"
        description: ""
        projectID: ""

k0s:
  version: v1.32.5+k0s.1
  api:
    extraArgs: {}

