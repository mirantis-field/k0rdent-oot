{{- if gt (.Values.workersNumber | int) 0 }}
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: {{ .Values.cluster.name }}-workers
  namespace: {{ .Values.cluster.namespace }}
  labels:
    {{- include "openstack-enhanced-cp.labels" . | nindent 4 }}
spec:
  clusterName: {{ .Values.cluster.name }}
  replicas: {{ .Values.workersNumber }}
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: {{ .Values.cluster.name }}
      cluster.x-k8s.io/deployment-name: {{ .Values.cluster.name }}-workers
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: {{ .Values.cluster.name }}
        cluster.x-k8s.io/deployment-name: {{ .Values.cluster.name }}-workers
    spec:
      clusterName: {{ .Values.cluster.name }}
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: K0sWorkerConfigTemplate
          name: {{ .Values.cluster.name }}-worker-bootstrap
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: OpenStackMachineTemplate
        name: {{ .Values.cluster.name }}-worker-mt
      version: {{ .Values.k0s.version }}
{{- end }} 