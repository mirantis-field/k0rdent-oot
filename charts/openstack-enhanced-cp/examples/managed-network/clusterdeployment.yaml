apiVersion: hmc.mirantis.com/v1alpha1
kind: ClusterDeployment
metadata:
  name: openstack-enhanced-managed-network
  namespace: hmc-system
spec:
  template: openstack-enhanced-cp
  credential: openstack-credential
  config:
    # Basic cluster configuration
    controlPlaneNumber: 3
    workersNumber: 2
    
    # Cluster identity and region
    identityRef:
      name: "openstack-credential"
      cloudName: "openstack"
      region: "RegionOne"
    
    # Network configuration - using managed networks (CAPO will create them)
    networking:
      useExistingNetwork: false
      managedSubnets:
        - cidr: "10.6.0.0/24"
          dnsNameservers:
            - "8.8.8.8"
            - "8.8.4.4"
    
    # External network for floating IPs
    externalNetwork:
      filter:
        name: "public"
    
    # Control plane configuration with volume type
    controlPlane:
      flavor: "m1.medium"
      sshKeyName: "my-keypair"
      image:
        filter:
          name: "ubuntu-22.04-kubernetes"
      rootVolume:
        sizeGiB: 50
        type: "fast-ssd"  # Different volume type
        availabilityZone:
          from: "Machine"  # Use machine's failure domain
      securityGroups:
        - filter:
            name: "default"
    
    # Worker configuration with volume type
    worker:
      flavor: "m1.large"
      sshKeyName: "my-keypair"
      image:
        filter:
          name: "ubuntu-22.04-kubernetes"
      rootVolume:
        sizeGiB: 100
        type: "standard"  # Standard volume type
        # No availability zone specified - will use default
      securityGroups:
        - filter:
            name: "default"
    
    # Security groups configuration
    managedSecurityGroups:
      allowAllInClusterTraffic: true
    
    # API server load balancer
    apiServerLoadBalancer:
      enabled: true
    
    # Bastion host configuration
    bastion:
      enabled: true
      spec:
        flavor: "m1.small"
        sshKeyName: "my-keypair"
        image:
          filter:
            name: "ubuntu-22.04"
    
    # K0s configuration
    k0s:
      version: "v1.32.5+k0s.1"
      api:
        extraArgs:
          audit-log-maxage: "30"
          audit-log-maxbackup: "10" 