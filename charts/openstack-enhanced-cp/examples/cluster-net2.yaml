apiVersion: k0rdent.mirantis.com/v1beta1
kind: ClusterDeployment
metadata:
  name: dev-cluster
  namespace: kcm-system
spec:
  template: openstack-enhanced-cp-1-0-0
  credential: openstack-cluster-identity-cred
  config:
    # Cluster configuration
    controlPlaneNumber: 1
    workersNumber: 3
    
    # Control plane configuration
    controlPlane:
      flavor: "m1.large"
      image:
        filter:
          name: "ubuntu-22.04"
      sshKeyName: "poc-k0rdent-mgmt-key"
      rootVolume:
        size: 50
        volumeType: "volumes"  # Specify your volume type
    
    # Worker configuration
    worker:
      flavor: "m1.medium"
      image:
        filter:
          name: "ubuntu-22.04"
      sshKeyName: "exness-k0rdent-mgmt-key"
      rootVolume:
        size: 50
        volumeType: "volumes"  # Specify your volume type
    
    # Enhanced: Use existing network net-2 and subnet-net-2
    networking:
      useExistingNetwork: true
      existingNetwork:
        name: "jhennig-k0rdent-managed-cluster-network"
      existingSubnet:
        name: "jhennig-k0s-subnet"
      externalNetwork:
        filter:
          name: "public"
    
    # Identity configuration
    identityRef:
      name: "openstack-cluster-identity-cred"
      cloudName: "openstack"
      region: "RegionOne"  # Replace with your region 