apiVersion: k0rdent.mirantis.com/v1beta1
kind: ClusterDeployment
metadata:
  name: my-net2-cluster
  namespace: kcm-system
spec:
  template: openstack-enhanced-cp-1-0-0
  credential: openstack-cluster-identity-cred
  config:
    # Cluster configuration
    controlPlaneNumber: 3
    workersNumber: 2
    
    # Control plane configuration
    controlPlane:
      flavor: "m1.large"
      image:
        filter:
          name: "ubuntu-22.04"
      sshKeyName: "your-keypair"
      rootVolume:
        size: 50
        volumeType: "ssd"  # Specify your volume type
    
    # Worker configuration
    worker:
      flavor: "m1.medium"
      image:
        filter:
          name: "ubuntu-22.04"
      sshKeyName: "your-keypair"
      rootVolume:
        size: 50
        volumeType: "ssd"  # Specify your volume type
    
    # Enhanced: Use existing network net-2 and subnet-net-2
    useExistingNetwork: true
    existingNetwork:
      name: "net-2"
    existingSubnet:
      name: "subnet-net-2"
    
    # External network configuration
    externalNetwork:
      filter:
        name: "external"  # Replace with your external network name
    
    # Identity configuration
    identityRef:
      name: "openstack-cluster-identity-cred"
      cloudName: "openstack"
      region: "RegionOne"  # Replace with your region
    
    # OpenStack Cloud Controller Manager
    ccmRegional: true
    
    # Optional: Enable CCM CA certificate if needed
    # ccmCaCert:
    #   enabled: true
    #   source: "secret"
    #   secretName: "openstack-ca-cert"
    #   key: "ca.crt" 