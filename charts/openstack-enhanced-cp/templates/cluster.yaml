apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: {{ .Values.clusterName }}
  namespace: {{ .Values.clusterNamespace }}
  {{- with .Values.clusterAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "openstack-enhanced-cp.labels" . | nindent 4 }}
    {{- with .Values.clusterLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  clusterNetwork:
    pods:
      cidrBlocks:
        {{- toYaml .Values.clusterNetwork.pods.cidrBlocks | nindent 8 }}
    services:
      cidrBlocks:
        {{- toYaml .Values.clusterNetwork.services.cidrBlocks | nindent 8 }}
    serviceDomain: {{ .Values.clusterNetwork.serviceDomain }}
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    kind: K0sControlPlane
    name: {{ .Values.clusterName }}-cp
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: OpenStackCluster
    name: {{ .Values.clusterName }}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: OpenStackCluster
metadata:
  name: {{ .Values.clusterName }}
  namespace: {{ .Values.clusterNamespace }}
spec:
  {{- if .Values.networking.useExistingNetwork }}
  # Use existing network configuration
  network:
    {{- if .Values.networking.existingNetwork.id }}
    id: {{ .Values.networking.existingNetwork.id }}
    {{- else }}
    filter:
      name: {{ .Values.networking.existingNetwork.name }}
    {{- end }}
  subnet:
    {{- if .Values.networking.existingSubnet.id }}
    id: {{ .Values.networking.existingSubnet.id }}
    {{- else }}
    filter:
      name: {{ .Values.networking.existingSubnet.name }}
    {{- end }}
  {{- else }}
  # Create managed network and subnets
  managedSubnets:
    {{- toYaml .Values.networking.managedSubnets | nindent 4 }}
  {{- end }}
  
  externalNetwork:
    filter:
      name: {{ .Values.networking.externalNetwork.filter.name }}
  
  identityRef:
    kind: Secret
    name: {{ .Values.identityRef.name }}
  
  {{- if .Values.managedSecurityGroups }}
  managedSecurityGroups:
    {{- toYaml .Values.managedSecurityGroups | nindent 4 }}
  {{- end }}
  
  {{- if .Values.apiServerLoadBalancer.enabled }}
  apiServerLoadBalancer:
    enabled: {{ .Values.apiServerLoadBalancer.enabled }}
  {{- end }}
  
  {{- if .Values.bastion.enabled }}
  bastion:
    enabled: {{ .Values.bastion.enabled }}
    spec:
      flavor: {{ .Values.bastion.spec.flavor }}
      image:
        filter:
          name: {{ .Values.bastion.spec.image.filter.name }}
      sshKeyName: {{ .Values.bastion.spec.sshKeyName }}
      {{- if .Values.bastion.spec.providerID }}
      providerID: {{ .Values.bastion.spec.providerID }}
      {{- end }}
  {{- end }}
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: K0sControlPlane
metadata:
  name: {{ .Values.clusterName }}-cp
  namespace: {{ .Values.clusterNamespace }}
spec:
  replicas: {{ .Values.controlPlaneNumber }}
  k0sConfigSpec:
    k0s:
      apiVersion: k0s.k0sproject.io/v1beta1
      kind: ClusterConfig
      spec:
        api:
          {{- if .Values.k0s.api.extraArgs }}
          extraArgs:
            {{- toYaml .Values.k0s.api.extraArgs | nindent 12 }}
          {{- end }}
        extensions:
          helm:
            repositories:
            - name: k0rdent
              url: https://k0rdent.github.io/kcm
        network:
          podCIDR: {{ (index .Values.clusterNetwork.pods.cidrBlocks 0) }}
          serviceCIDR: {{ (index .Values.clusterNetwork.services.cidrBlocks 0) }}
          provider: calico
          calico:
            mode: vxlan
            overlay: Always
            mtu: 0
            wireguard: false
    files:
    {{- if .Values.ccm.caCert.enabled }}
    # CCM CA Certificate configuration
    - src: /etc/kubernetes/ccm-ca.crt
      path: /etc/kubernetes/ccm-ca.crt
      permissions: "0644"
      {{- if eq .Values.ccm.caCert.source "inline" }}
      content: |
        {{ .Values.ccm.caCert.content | nindent 8 }}
      {{- else if eq .Values.ccm.caCert.source "secret" }}
      contentFrom:
        secret:
          name: {{ .Values.ccm.caCert.secretName }}
          key: {{ .Values.ccm.caCert.key }}
      {{- else if eq .Values.ccm.caCert.source "configmap" }}
      contentFrom:
        configMap:
          name: {{ .Values.ccm.caCert.configMapName }}
          key: {{ .Values.ccm.caCert.key }}
      {{- end }}
    {{- end }}
    preK0sCommands:
    # OpenStack Cloud Controller Manager configuration
    - mkdir -p /etc/kubernetes
    {{- if .Values.ccm.caCert.enabled }}
    - echo "CA certificate configured for OpenStack CCM"
    {{- end }}
    postK0sCommands:
    # Apply OpenStack Cloud Controller Manager
    - k0s kubectl apply -f https://raw.githubusercontent.com/kubernetes/cloud-provider-openstack/master/manifests/controller-manager/cloud-controller-manager-roles.yaml
    - k0s kubectl apply -f https://raw.githubusercontent.com/kubernetes/cloud-provider-openstack/master/manifests/controller-manager/cloud-controller-manager-role-bindings.yaml
    - k0s kubectl apply -f https://raw.githubusercontent.com/kubernetes/cloud-provider-openstack/master/manifests/controller-manager/openstack-cloud-controller-manager-ds.yaml
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: OpenStackMachineTemplate
      name: {{ .Values.clusterName }}-cp-mt
  version: {{ .Values.k0s.version }}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: OpenStackMachineTemplate
metadata:
  name: {{ .Values.clusterName }}-cp-mt
  namespace: {{ .Values.clusterNamespace }}
spec:
  template:
    spec:
      flavor: {{ .Values.controlPlane.flavor }}
      image:
        filter:
          name: {{ .Values.controlPlane.image.filter.name }}
      sshKeyName: {{ .Values.controlPlane.sshKeyName }}
      {{- if .Values.controlPlane.providerID }}
      providerID: {{ .Values.controlPlane.providerID }}
      {{- end }}
      
      # Enhanced root volume configuration with volume type support
      rootVolume:
        size: {{ .Values.controlPlane.rootVolume.size }}
        {{- if .Values.controlPlane.rootVolume.volumeType }}
        volumeType: {{ .Values.controlPlane.rootVolume.volumeType }}
        {{- end }}
        {{- if .Values.controlPlane.rootVolume.availabilityZone }}
        availabilityZone: {{ .Values.controlPlane.rootVolume.availabilityZone }}
        {{- end }}
      
      {{- if .Values.controlPlane.additionalBlockDevices }}
      additionalBlockDevices:
        {{- toYaml .Values.controlPlane.additionalBlockDevices | nindent 8 }}
      {{- end }}
      
      {{- if .Values.controlPlane.portOpts }}
      portOpts:
        {{- toYaml .Values.controlPlane.portOpts | nindent 8 }}
      {{- end }}
      
      securityGroups:
        {{- toYaml .Values.controlPlane.securityGroups | nindent 8 }}
      
      {{- if .Values.networking.useExistingNetwork }}
      # Use existing subnet for control plane
      subnet:
        {{- if .Values.networking.existingSubnet.id }}
        id: {{ .Values.networking.existingSubnet.id }}
        {{- else }}
        filter:
          name: {{ .Values.networking.existingSubnet.name }}
        {{- end }}
      {{- end }}
---
{{- if gt (.Values.workersNumber | int) 0 }}
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: {{ .Values.clusterName }}-workers
  namespace: {{ .Values.clusterNamespace }}
spec:
  clusterName: {{ .Values.clusterName }}
  replicas: {{ .Values.workersNumber }}
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: {{ .Values.clusterName }}
      cluster.x-k8s.io/deployment-name: {{ .Values.clusterName }}-workers
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: {{ .Values.clusterName }}
        cluster.x-k8s.io/deployment-name: {{ .Values.clusterName }}-workers
    spec:
      clusterName: {{ .Values.clusterName }}
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: K0sWorkerConfigTemplate
          name: {{ .Values.clusterName }}-worker-bootstrap
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: OpenStackMachineTemplate
        name: {{ .Values.clusterName }}-worker-mt
      version: {{ .Values.k0s.version }}
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: K0sWorkerConfigTemplate
metadata:
  name: {{ .Values.clusterName }}-worker-bootstrap
  namespace: {{ .Values.clusterNamespace }}
spec:
  template:
    spec:
      files:
      {{- if .Values.ccm.caCert.enabled }}
      # CCM CA Certificate configuration for workers
      - src: /etc/kubernetes/ccm-ca.crt
        path: /etc/kubernetes/ccm-ca.crt
        permissions: "0644"
        {{- if eq .Values.ccm.caCert.source "inline" }}
        content: |
          {{ .Values.ccm.caCert.content | nindent 10 }}
        {{- else if eq .Values.ccm.caCert.source "secret" }}
        contentFrom:
          secret:
            name: {{ .Values.ccm.caCert.secretName }}
            key: {{ .Values.ccm.caCert.key }}
        {{- else if eq .Values.ccm.caCert.source "configmap" }}
        contentFrom:
          configMap:
            name: {{ .Values.ccm.caCert.configMapName }}
            key: {{ .Values.ccm.caCert.key }}
        {{- end }}
      {{- end }}
      preK0sCommands:
      - mkdir -p /etc/kubernetes
      {{- if .Values.ccm.caCert.enabled }}
      - echo "CA certificate configured for OpenStack CCM on worker"
      {{- end }}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: OpenStackMachineTemplate
metadata:
  name: {{ .Values.clusterName }}-worker-mt
  namespace: {{ .Values.clusterNamespace }}
spec:
  template:
    spec:
      flavor: {{ .Values.worker.flavor }}
      image:
        filter:
          name: {{ .Values.worker.image.filter.name }}
      sshKeyName: {{ .Values.worker.sshKeyName }}
      {{- if .Values.worker.providerID }}
      providerID: {{ .Values.worker.providerID }}
      {{- end }}
      
      # Enhanced root volume configuration with volume type support
      rootVolume:
        size: {{ .Values.worker.rootVolume.size }}
        {{- if .Values.worker.rootVolume.volumeType }}
        volumeType: {{ .Values.worker.rootVolume.volumeType }}
        {{- end }}
        {{- if .Values.worker.rootVolume.availabilityZone }}
        availabilityZone: {{ .Values.worker.rootVolume.availabilityZone }}
        {{- end }}
      
      {{- if .Values.worker.additionalBlockDevices }}
      additionalBlockDevices:
        {{- toYaml .Values.worker.additionalBlockDevices | nindent 8 }}
      {{- end }}
      
      {{- if .Values.worker.portOpts }}
      portOpts:
        {{- toYaml .Values.worker.portOpts | nindent 8 }}
      {{- end }}
      
      securityGroups:
        {{- toYaml .Values.worker.securityGroups | nindent 8 }}
      
      {{- if .Values.networking.useExistingNetwork }}
      # Use existing subnet for workers
      subnet:
        {{- if .Values.networking.existingSubnet.id }}
        id: {{ .Values.networking.existingSubnet.id }}
        {{- else }}
        filter:
          name: {{ .Values.networking.existingSubnet.name }}
        {{- end }}
      {{- end }}
{{- end }} 